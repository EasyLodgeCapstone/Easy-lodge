$kind: http-request
name: Reset Password
method: POST
url: '{{baseUrl}}/api/auth/reset-password'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "otp": "123456",
      "newPassword": "newpassword123"
    }
